# logrotate_example.conf — пример конфига ротации для справки
# В продакшне кладётся в /etc/logrotate.d/myapp

/home/n7/pki_tools/logs/*.log {
    daily               # ротировать ежедневно
    rotate 7            # хранить 7 архивов
    compress            # сжимать gzip
    delaycompress       # сжимать не сразу а со следующей ротации
    missingok           # не ругаться если файла нет
    notifempty          # не ротировать пустые файлы
    create 640 n7 n7    # создавать новый файл с правами 640
    dateext             # добавлять дату к имени архива
}